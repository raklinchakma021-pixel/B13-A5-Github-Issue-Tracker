<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | Main</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="bg-white shadow p-4 flex justify-between items-center">

<h1 class="text-xl font-bold">Github Issues Tracker</h1>

<div class="flex gap-2">
<div class="relative ">
  <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
    <i class="fas fa-magnifying-glass"></i>
  </span>
  <input id="searchInput" type="text" placeholder="Search issues..." 
         class="border p-2 pl-10 rounded w-full" />
</div>

<button onclick="searchIssue()"
class="bg-blue-500 text-white px-3 rounded"><i class="fa-solid fa-plus"></i>
New Issues
</button>

</div>

</nav>


<div class="p-6">
    <div class="flex gap-3 mb-6">
       <button onclick="loadIssues('all')" id="allTab" class="tab bg-blue-500 text-white px-8 py-2 rounded">All</button>

       <button onclick="loadIssues('open')" id="openTab" class="tab outline px-8 py2 text-gray-950 rounded">Open</button>
       <button onclick="loadIssues('closed')" id="closedTab" class="tab outline px-8 py2 text-gray-950 rounded">Closed</button>
    </div>


    <div id="issueCount" class="mb-4 font-semibold"></div>

  
<div id="issuesContainer"
class="grid md:grid-cols-2 lg:grid-cols-4 gap-6">
</div>



</div>

<script src="./script.js"></script>
</body>
</html>
